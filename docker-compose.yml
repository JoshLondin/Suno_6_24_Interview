services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/app.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
